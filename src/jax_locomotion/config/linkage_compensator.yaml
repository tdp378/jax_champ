jax_linkage_compensator:
  ros__parameters:
    enabled: true
    publish_diagnostics: true
    lock_calf_in_passive_zone: true
    passive_zone_calf_cmd_deadband: 0.01

    # Motor passive zone — calf motor does NOT move while thigh is inside this range.
    # The linkage naturally drives the calf without motor assistance.
    #   +0.90 backward: linkage fully closes the calf
    #   -0.35 forward : linkage fully opens the calf
    neutral_min: -0.35
    neutral_max: 0.90

    # RViz display neutral zone — keep at 0.0/0.0 so the visualisation always
    # shows the full passive calf motion even when the motor is not moving.
    display_neutral_min: 0.0
    display_neutral_max: 0.0

    linkage_ratio: 1.0

    # Set to 1.0 for default correction sign, or -1.0 to invert if
    # your calf joint convention is opposite (e.g., back = -, forward = +).
    calf_direction_sign: 1.0

    # Must be >= max passive travel (thigh_limit * linkage_ratio)
    max_correction: 0.90

    # Beyond these thigh angles the calf motor must move to allow further travel
    thigh_backward_limit: 0.90
    thigh_forward_limit: -0.35

    calf_min_angle: -0.90
    calf_max_angle: 0.90

    # Calf travel window around passive position at the forward hard-stop
    forward_calf_window: 0.10
